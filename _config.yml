# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
locale: es-CL
title: El Vertedero Cerebral
subtitle: cat /dev/brain > /dev/blog
email:
description: >- # this means to ignore newlines until "baseurl:"
  Un bloc de notas para liberar las presiones cerebrales.
twitter_username: the_fariax
github_username: fariax
minimal_mistakes_skin: air
search: true
breadcrumbs: true

comments:
  provider: "disqus"
  disqus:
    shortname: el-vertedero-cerebral

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: America/Santiago # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Analytics
analytics:
  provider : "google-gtag"
  google:
    tracking_id : G-M8Q4B63CNC
    anonymize_ip : false

author:
  name   : "Cristian Farias"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Un bloc de notas para liberar las presiones cerebrales."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://fariax.github.io"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/the_fariax"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fariax"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/faricolors"
    - label: "RSS"
      icon: "fas fa-fw fa-rss-square"
      url: http://feeds.feedburner.com/el-vertedero-cerebral
    - label: "SUSCRIBETE!!"
      icon: "fas fa-fw fa-envelope"
      url: "https://feedburner.google.com/fb/a/mailverify?uri=el-vertedero-cerebral&amp;loc=es_ES>"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/the_fariax"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fariax"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/faricolors"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/